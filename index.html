<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Japanese">
<meta name="theme-color" content="#ffb703">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Japanese for Kids</title>
<style>
:root{
  --accent:#ff8a5b; --accent2:#ffb703;
  --ink:#2b2140; --muted:#7d7597; --paper:#fff7ef; --card:#ffffff;
  --line:#efe6dd; --ok:#3fbf7f; --no:#ff6b6b;
  --r:28px; --shadow:0 12px 34px rgba(60,40,20,.14);
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-l:env(safe-area-inset-left,0px);
  --safe-r:env(safe-area-inset-right,0px);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none;}
html,body{height:100%;margin:0;overflow:hidden;}
body{
  font-family:-apple-system,"Hiragino Maru Gothic ProN","Hiragino Sans","Yu Gothic",system-ui,sans-serif;
  color:var(--ink);
  background:radial-gradient(120% 120% at 50% 0%, #fff7ef 0%, #ffeede 55%, #ffe3c9 100%);
  user-select:none; -webkit-user-select:none;
  touch-action:manipulation;
}
#app{position:fixed; inset:0; padding:calc(var(--safe-t) + 8px) calc(var(--safe-r) + 14px) calc(var(--safe-b) + 8px) calc(var(--safe-l) + 14px); display:flex; flex-direction:column;}
.screen{position:absolute; inset:0; display:flex; flex-direction:column; animation:fade .25s ease;}
@keyframes fade{from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none}}
@keyframes pop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
@keyframes shakex{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-7px)}80%{transform:translateX(7px)}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes ring{to{stroke-dashoffset:var(--dash)}}
@keyframes rise{from{transform:translateY(20px);opacity:0}to{transform:none;opacity:1}}

.center{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px; text-align:center;}
.row{display:flex; gap:16px; align-items:center; justify-content:center; flex-wrap:wrap;}
.kana{font-weight:800; letter-spacing:.02em;}
.big-kana{font-size:clamp(48px,9vh,96px); font-weight:800;}
.hint{font-size:20px; color:var(--muted); font-weight:700;}
.hint-kana{font-size:26px; font-weight:800; color:var(--muted);}
.gloss{font-size:28px; font-weight:800; color:var(--muted); letter-spacing:.01em;}
.gloss.small{font-size:22px;}
.romaji{font-size:22px; font-weight:700; color:var(--muted); opacity:.78; font-style:italic; letter-spacing:.03em; margin-top:-4px;}

/* Buttons / tap targets >= 88px */
.btn{min-height:88px; min-width:88px; border:none; border-radius:var(--r); background:var(--card);
  box-shadow:var(--shadow); font-size:30px; font-weight:800; color:var(--ink); cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:10px; padding:14px 26px; transition:transform .08s;}
.btn:active{transform:scale(.94)}
.btn.primary{background:linear-gradient(180deg,var(--accent),var(--accent2)); color:#fff; text-shadow:0 1px 0 rgba(0,0,0,.08);}
.btn.big{min-height:120px; font-size:38px; padding:20px 40px;}
.btn.ghost{background:rgba(255,255,255,.6); box-shadow:none; border:3px solid var(--line);}

/* Speaker */
.speaker{width:150px;height:150px;border-radius:50%;background:linear-gradient(180deg,var(--accent),var(--accent2));
  color:#fff;border:none;box-shadow:var(--shadow);font-size:66px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;}
.speaker:active{transform:scale(.93)}
.speaker.small{width:104px;height:104px;font-size:46px;}
.speaker.pulse::after{content:"";position:absolute;inset:-8px;border-radius:50%;border:5px solid var(--accent);opacity:.5;animation:sonar 1.4s ease-out infinite;}
@keyframes sonar{to{transform:scale(1.35);opacity:0}}

/* Cards grid for tap games */
.cards{display:grid; gap:18px; width:min(92vw,900px);}
.cards.g4{grid-template-columns:repeat(2,1fr);}
.cards.g3{grid-template-columns:repeat(3,1fr);}
.cards.g6{grid-template-columns:repeat(3,1fr);}
.card{background:var(--card); border-radius:var(--r); box-shadow:var(--shadow); min-height:clamp(120px,26vh,190px);
  display:flex;align-items:center;justify-content:center;font-size:clamp(56px,13vh,104px);cursor:pointer;
  border:5px solid transparent; transition:transform .09s, border-color .15s; position:relative; overflow:hidden;}
.card:active{transform:scale(.95)}
.card.correct{border-color:var(--ok); background:#eafff3; animation:pop .35s;}
.card.wrong{border-color:var(--no); animation:shakex .4s;}
.card.dim{opacity:.28; pointer-events:none;}
.card.pick{border-color:var(--accent);}
.card .lbl{position:absolute;bottom:6px;font-size:20px;color:var(--muted);font-weight:800}
.picemoji{line-height:1;display:inline-flex;align-items:center;justify-content:center}
.picsvg{display:inline-flex;align-items:center;justify-content:center;width:1.15em;height:1.15em;vertical-align:middle}
.picsvg svg{width:100%;height:100%;display:block}

/* Kana tiles */
.ktile{background:var(--card);border-radius:22px;box-shadow:var(--shadow);min-height:120px;min-width:120px;
  display:flex;align-items:center;justify-content:center;font-size:clamp(52px,11vh,84px);font-weight:800;cursor:pointer;border:5px solid transparent}
.ktile:active{transform:scale(.95)}
.ktile.correct{border-color:var(--ok);background:#eafff3;animation:pop .35s}
.ktile.wrong{border-color:var(--no);animation:shakex .4s}

/* Header inside session */
.shead{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:2px 6px 6px;}
.quest{width:64px;height:64px;flex:0 0 auto;}
.mini-ava{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:34px;background:#fff;box-shadow:var(--shadow)}

/* Home */
.home-wrap{flex:1;display:grid;grid-template-columns:1.05fr .95fr;gap:20px;min-height:0;}
.home-left{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;}
.home-right{display:flex;flex-direction:column;gap:14px;min-height:0;}
.panel{background:rgba(255,255,255,.66);border-radius:var(--r);box-shadow:var(--shadow);padding:16px;}
.start-btn{width:min(46vw,420px);}
.circle-quest{position:relative;width:min(40vh,320px);height:min(40vh,320px);display:flex;align-items:center;justify-content:center}
.circle-quest .cta{position:absolute;display:flex;flex-direction:column;align-items:center;gap:6px;font-size:34px;font-weight:800;color:var(--accent)}
.circle-quest .cta .big{font-size:64px}

/* Garden */
.garden{width:100%;height:100%;border-radius:var(--r);overflow:hidden;background:linear-gradient(180deg,#bfe9ff 0%,#e7f9ff 60%,#d8f6c8 60%,#c4efac 100%);box-shadow:inset 0 0 0 3px rgba(255,255,255,.5)}

/* Chips */
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{background:#fff;border-radius:999px;padding:8px 14px;font-weight:800;font-size:18px;box-shadow:var(--shadow);display:flex;gap:6px;align-items:center}

/* Overlays */
.overlay{position:fixed;inset:0;background:rgba(30,20,10,.42);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:50;animation:fade .2s}
.sheet{background:var(--paper);border-radius:32px;box-shadow:var(--shadow);max-width:min(94vw,780px);max-height:92vh;overflow:auto;padding:22px;width:100%}
.celebrate{font-size:120px;animation:pop .5s}
.toast{position:fixed;left:50%;top:14%;transform:translateX(-50%);background:#fff;border-radius:22px;box-shadow:var(--shadow);padding:14px 26px;font-size:26px;font-weight:800;z-index:60;animation:rise .3s}

/* Parent dashboard */
.dash h2{margin:.2em 0}
.dash .grid46{display:grid;grid-template-columns:repeat(12,1fr);gap:5px}
.dash .kcell{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;background:#eee;color:#bbb}
.dash .kcell.seen{background:#ffe4c4;color:#a9702f}
.dash .kcell.known{background:#bff0d0;color:#1f7a4d}
.dash .bar{height:16px;border-radius:8px;background:#eee;overflow:hidden}
.dash .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.dash table{width:100%;border-collapse:collapse}
.dash td{padding:5px 4px;font-size:15px;border-bottom:1px solid var(--line);vertical-align:middle}
.dash .num{font-variant-numeric:tabular-nums;font-weight:800}
.gear{position:absolute;top:calc(var(--safe-t) + 10px);right:calc(var(--safe-r) + 12px);width:56px;height:56px;border-radius:50%;
  background:rgba(255,255,255,.7);display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:var(--shadow);z-index:20;cursor:pointer;user-select:none}
.gear .fill{position:absolute;inset:0;border-radius:50%;background:conic-gradient(var(--accent) var(--p,0deg), transparent 0);opacity:.5}
.pill{display:inline-block;background:#fff;border-radius:999px;padding:4px 12px;font-weight:800;font-size:14px;box-shadow:var(--shadow);margin:2px}
.seg{display:flex;gap:6px;flex-wrap:wrap}
.seg button{border:3px solid var(--line);background:#fff;border-radius:14px;padding:8px 14px;font-weight:800;font-size:16px;cursor:pointer}
.seg button.on{border-color:var(--accent);background:#fff3ea}
textarea{width:100%;min-height:90px;border-radius:14px;border:2px solid var(--line);padding:10px;font-family:ui-monospace,monospace;font-size:12px}
.small{font-size:13px;color:var(--muted)}
.sticker{width:96px;height:96px;border-radius:24px;background:#fff;box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:44px;position:relative}
.sticker.locked{filter:grayscale(1);opacity:.35}
.sticker small{font-size:12px;color:var(--muted);font-weight:800;position:absolute;bottom:6px}

/* body figure */
.figwrap{width:min(92vw,760px)}
.figwrap svg{width:100%;height:auto;display:block}
.zone{fill:transparent;cursor:pointer}
.zone.glow{fill:rgba(255,138,91,.35);animation:bob 1.2s ease-in-out infinite}
.zone.hit{fill:rgba(63,191,127,.45)}
.zone.miss{fill:rgba(255,107,107,.4)}

/* tiles for build-a-sentence */
.tile{border:none;border-radius:16px;padding:14px 18px;font-size:34px;font-weight:800;box-shadow:var(--shadow);cursor:pointer;background:#fff}
.tile.p-wa{background:#ffd6a5;color:#8a4b0d}
.tile.p-ga{background:#a5d8ff;color:#0b4a7a}
.tile.p-o{background:#d0bfff;color:#4b2a8a}
.tile.p-end{background:#e9ecef;color:#495057}
.tile.used{opacity:.3;pointer-events:none}
.slot{min-height:60px;border-bottom:5px dashed var(--accent);min-width:90px;display:inline-flex;align-items:center;justify-content:center;font-size:34px;font-weight:800;padding:4px 10px}

/* rotate hint */
#rotate{display:none;position:fixed;inset:0;background:var(--paper);z-index:100;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;padding:30px}
@media (orientation:portrait) and (max-height:820px){ #rotate{display:flex} }
.confetti{position:fixed;inset:0;pointer-events:none;z-index:70;overflow:hidden}
.confetti i{position:absolute;top:-20px;font-size:28px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(360deg)}}
</style>
</head>

/* ===================== HELPERS ===================== */
const $=(sel,root)=>(root||document).querySelector(sel);
function h(tag,attrs,...kids){
  const e=document.createElement(tag); attrs=attrs||{};
  for(const k in attrs){
    const v=attrs[k];
    if(v==null||v===false) continue;
    if(k==='class') e.className=v;
    else if(k==='style') e.style.cssText=v;
    else if(k==='html') e.innerHTML=v;
    else if(k.slice(0,2)==='on'&&typeof v==='function') e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  kids.flat(9).forEach(kid=>{ if(kid==null||kid===false) return; e.appendChild(typeof kid==='object'?kid:document.createTextNode(''+kid)); });
  return e;
}
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function sample(a){ return a[Math.floor(Math.random()*a.length)]; }
function pad(n){ return n<10?'0'+n:''+n; }
function todayStr(d){ d=d||new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function strToDate(s){ const p=s.split('-').map(Number); return new Date(p[0],p[1]-1,p[2]); }
function addDaysStr(s,n){ const d=strToDate(s); d.setDate(d.getDate()+n); return todayStr(d); }
function daysBetween(a,b){ return Math.round((strToDate(b)-strToDate(a))/86400000); }
function weekId(d){ const dt=new Date(d.getFullYear(),d.getMonth(),d.getDate()); const dn=(dt.getDay()+6)%7; dt.setDate(dt.getDate()-dn+3); const ft=new Date(dt.getFullYear(),0,4); const w=1+Math.round(((dt-ft)/86400000-3+((ft.getDay()+6)%7))/7); return dt.getFullYear()*100+w; }

const Audio2={
  voice:null, primed:false, supported:('speechSynthesis' in window),
  init(){
    if(!this.supported) return;
    const load=()=>{ const vs=speechSynthesis.getVoices()||[];
      this.voice = vs.find(v=>v.lang==='ja-JP') || vs.find(v=>(v.lang||'').toLowerCase().indexOf('ja')===0) || vs.find(v=>/kyoko|otoya|japan/i.test(v.name)) || null; };
    load();
    try{ speechSynthesis.onvoiceschanged=load; }catch(e){}
    // iOS sometimes needs a nudge
    setTimeout(load,400); setTimeout(load,1500);
  },
  prime(){ if(!this.supported||this.primed) return;
    try{ const u=new SpeechSynthesisUtterance(' '); u.volume=0; u.lang='ja-JP'; speechSynthesis.speak(u); this.primed=true; }catch(e){}
    const vs=(speechSynthesis.getVoices&&speechSynthesis.getVoices())||[];
    if(!this.voice&&vs.length) this.voice=vs.find(v=>(v.lang||'').toLowerCase().indexOf('ja')===0)||null;
  },
  hasVoice(){ return !!this.voice; },
  speak(text,opts){ if(!this.supported||!text) return;
    try{ speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(text);
      u.lang='ja-JP'; u.rate=(opts&&opts.rate)||0.72; u.pitch=(opts&&opts.pitch)||1.12;
      if(this.voice) u.voice=this.voice;
      speechSynthesis.speak(u);
    }catch(e){}
  },
  speakItem(it,opts){ if(!it) return; this.speak(it.speak||it.kana,opts); }
};

/* ===================== SRS ===================== */
const BOX_DAYS=[null,1,2,4,8,16];
function st(p,key){ return p.items[key]; }
function isIntroduced(p,key){ const s=p.items[key]; return !!(s&&s.introducedDate); }
function isKnownKey(p,key){ const s=p.items[key]; return !!(s&&s.box>=3); }
function introduceItem(p,key){
  const t=todayStr();
  if(!p.items[key]) p.items[key]={box:1,due:addDaysStr(t,1),introducedDate:t,lastReviewed:t};
  else if(!p.items[key].introducedDate) p.items[key].introducedDate=t;
  saveProfile(p);
}
function gradeItem(p,key,correct){
  const t=todayStr(); let s=p.items[key];
  if(!s){ s=p.items[key]={box:1,due:addDaysStr(t,1),introducedDate:t,lastReviewed:t}; }
  const before=s.box>=3;
  if(correct){ s.box=Math.min(5,(s.box||1)+1); s.due=addDaysStr(t,BOX_DAYS[s.box]); }
  else { s.box=1; s.due=t; }
  s.lastReviewed=t;
  return { before, after:s.box>=3 };
}
function getDue(p){
  const t=todayStr(); const out=[];
  for(const key in p.items){ const s=p.items[key]; if(!s.introducedDate) continue;
    if(s.due && daysBetween(s.due,t)>=0){ const it=REG[key]; if(it) out.push(it); } }
  out.sort((a,b)=>{ const sa=p.items[a.key],sb=p.items[b.key]; if(sa.due!==sb.due) return sa.due<sb.due?-1:1; return sa.box-sb.box; });
  return out;
}
function backlogCount(p){ return getDue(p).length; }
function knownWordCount(p){ let n=0; for(const w of DATA.words) if(isKnownKey(p,'w:'+w.id)) n++; return n; }
function knownCountAll(p){ let n=0; for(const k in p.items) if(p.items[k].box>=3) n++; return n; }
function unitKnownFraction(p,uid){ const ws=WORDS_BY_UNIT[uid]||[]; if(!ws.length) return 1; let k=0; ws.forEach(it=>{ if(isKnownKey(p,it.key)) k++; }); return k/ws.length; }
function unitOpen(p,u){ if(u.order===1) return true; const prev=DATA.units.find(x=>x.order===u.order-1); if(!prev) return true; return unitKnownFraction(p,prev.id)>=0.6; }
function daysSinceStart(p){ return daysBetween(p.createdDate,todayStr()); }

/* Unlocks */
function hiraganaUnlocked(p){ return daysSinceStart(p)>=30 || knownWordCount(p)>=60; }
function unitStarted(p,uid){ return (WORDS_BY_UNIT[uid]||[]).some(it=>isIntroduced(p,it.key)); }
function patternUnlocked(p,pt){ const u=pt.unlock||{};
  if(knownWordCount(p) < (u.knownWords||0)) return false;
  if(u.unitStarted && !unitStarted(p,u.unitStarted)) return false; return true; }
function unlockedPatterns(p){ return DATA.patterns.filter(pt=>patternUnlocked(p,pt)); }

/* New-item selection (words) */
function introducedTodayCount(p){ const t=todayStr(); let n=0; for(const k in p.items) if(p.items[k].introducedDate===t) n++; return n; }
function pickNewWords(p,backlog){
  if(backlog>=15) return [];                    // post-holiday backlog pause
  const cap=p.settings.newPerDay||5;
  let slots=Math.max(0,cap-introducedTodayCount(p));
  if(slots<=0) return [];
  const cands=[];
  const ordered=[...DATA.units].sort((a,b)=>a.order-b.order);
  for(const u of ordered){ if(!unitOpen(p,u)) continue;
    for(const it of WORDS_BY_UNIT[u.id]){ if(!isIntroduced(p,it.key)) cands.push(it); } }
  return cands.slice(0,slots);
}
/* Next block of brand-new words for the on-demand "Learn more" flow — uncapped,
   ignores the daily limit and the 60% interleave gate, straight unit order.
   Body words are left to the daily flow (they use the tap-the-figure game). */
function nextNewWords(p,n){
  const out=[]; const ordered=[...DATA.units].sort((a,b)=>a.order-b.order);
  for(const u of ordered){ for(const it of WORDS_BY_UNIT[u.id]){
    if(!it.isBody && !isIntroduced(p,it.key)){ out.push(it); if(out.length>=n) return out; } } }
  return out;
}
function pickNewPhrase(p){
  const days=daysSinceStart(p);
  const elig=DATA.phrases.filter(ph=>{ const it=PHRASE[ph.id]; return !isIntroduced(p,it.key) && days>=(ph.week-1)*7; });
  elig.sort((a,b)=>a.week-b.week);
  return elig.length?PHRASE[elig[0].id]:null;
}
function yesterdayItems(p){
  const y=addDaysStr(todayStr(),-1); const out=[];
  for(const k in p.items){ const s=p.items[k]; if(s.lastReviewed===y||s.introducedDate===y){ const it=REG[k]; if(it&&(it.type==='word'||it.type==='phrase')) out.push(it); } }
  return shuffle(out).slice(0,4);
}

/* ===================== OPTIONS / DISTRACTORS ===================== */
function poolForItem(it){
  if(it.type==='phrase') return Object.values(PHRASE);
  if(it.type==='kana') return KANA_LIST;
  return Object.values(WORD).filter(w=>!w.isBody);
}
function pickOptions(target,pool,n,keyFn){
  keyFn=keyFn||(x=>x.emoji);
  const chosen=[target]; const used=new Set([keyFn(target)]);
  const same=shuffle(pool.filter(x=>x.key!==target.key&&x.unit===target.unit&&!used.has(keyFn(x))));
  const other=shuffle(pool.filter(x=>x.key!==target.key&&x.unit!==target.unit&&!used.has(keyFn(x))));
  for(const x of same.concat(other)){ if(chosen.length>=n) break; if(used.has(keyFn(x))) continue; chosen.push(x); used.add(keyFn(x)); }
  return shuffle(chosen);
}

function shade(hex,amt){ try{ let c=hex.replace('#',''); if(c.length===3)c=c.split('').map(x=>x+x).join(''); const n=parseInt(c,16); let r=(n>>16)+Math.round(255*amt),g=((n>>8)&255)+Math.round(255*amt),b=(n&255)+Math.round(255*amt); r=Math.min(255,r);g=Math.min(255,g);b=Math.min(255,b); return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);}catch(e){return hex;} }

/* ---------- Garden ---------- */
function gardenSVG(p){
  const g=p.garden.growth||0;
  const known=knownWordCount(p);
  const creature = known>=100?'🦜' : known>=50?'🐤' : known>=25?'🐥' : known>=10?'🐣' : '🥚';
  const flowers=['🌷','🌸','🌻','🌼','🌺','🏵️'];
  let plants='';
  const n=Math.min(g,18);
  for(let i=0;i<n;i++){ const x=8+ (i*88%84) + (i%3)*3; const y=70+ (i%4)*7; const f=flowers[i%flowers.length]; plants+=`<text x="${x}" y="${y}" font-size="9">${f}</text>`; }
  const trees = known>=25?'<text x="6" y="66" font-size="16">🌳</text>':'';
  const trees2 = known>=50?'<text x="86" y="66" font-size="16">🌳</text>':'';
  const svg=`<svg viewBox="0 0 100 88" class="garden" preserveAspectRatio="xMidYMid slice">
    <text x="80" y="18" font-size="14">☀️</text>
    <text x="14" y="16" font-size="9">☁️</text>
    <text x="46" y="52" font-size="22" style="animation:bob 2s infinite">${creature}</text>
    ${trees}${trees2}${plants}
  </svg>`;
  return h('div',{html:svg,style:'width:100%;height:100%'});
}

/* record a graded answer */
function record(it,correct){
  SESS.total++; if(correct) SESS.correct++;
  const r=gradeItem(CUR,it.key,correct);
  if(!r.before && r.after) SESS.newlyKnown.push(it.key);
  SESS.seen.add(it.key);
  saveProfile(CUR);
}

/* ---------- Session composer ---------- */
function lenMult(p){ return p.settings.sessionLen==='short'?0.7 : p.settings.sessionLen==='long'?1.35 : 1; }
function composeSession(p){
  const due=getDue(p);
  const backlog=due.length;
  const m=lenMult(p);
  const dueBody=due.filter(it=>it.type==='word'&&it.isBody);
  const dueWordPh=due.filter(it=>(it.type==='word'&&!it.isBody)||it.type==='phrase');
  const dueKana=due.filter(it=>it.type==='kana');
  const duePat=due.filter(it=>it.type==='pattern');
  const acts=[];
  // warm-up
  const warm=yesterdayItems(p);
  if(warm.length) acts.push(actWarmup(warm));

  // One unified session for everyone — difficulty paces itself via the unlocks
  // (hiragana/patterns appear only once the child has made enough progress),
  // never via a chosen age.
  const tap=shuffle(dueWordPh).slice(0,Math.round(5*m));
  if(tap.length) acts.push(actTap(tap));
  const prodPool=shuffle(dueWordPh.filter(it=>it.type==='word')).slice(0,Math.round(4*m));
  if(prodPool.length) acts.push(actProduction(prodPool));
  const matchPool=shuffle(dueWordPh.filter(it=>it.type==='word')).slice(0,3);
  if(matchPool.length>=3) acts.push(actMatch(matchPool.slice(0,3)));
  if(dueBody.length) acts.push(actBody(shuffle(dueBody).slice(0,Math.round(4*m))));
  if(hiraganaUnlocked(p)) acts.push(actKanaBlock(p,dueKana));
  if(unlockedPatterns(p).length) acts.push(actPatternBlock(p,duePat));
  // new words
  const nw=pickNewWords(p,backlog);
  nw.forEach(it=> acts.push(it.isBody?actBodyIntro(it):actIntro(it)));
  // phrase of the day
  const ph=pickNewPhrase(p) || sample(shuffle(dueWordPh.filter(x=>x.type==='phrase')).concat([null]));
  if(ph) acts.push(actPhraseOfDay(ph));
  // say-it finale
  const sayItems=(nw.length?nw:shuffle(dueWordPh.filter(x=>x.type==='word')).slice(0,2)).slice(0,2);
  if(sayItems.length) acts.push(actSayIt(sayItems));
  if(acts.length<=1){ // nothing due & nothing new -> gentle practice
    const anyKnown=Object.values(REG).filter(it=>(it.type==='word')&&isIntroduced(p,it.key));
    const practice=shuffle(anyKnown).slice(0,4);
    if(practice.length) acts.push(actTap(practice));
  }
  return acts;
}

/* Warm-up: replay yesterday, no grading */
function actWarmup(items){
  return (done)=>{
    let i=0;
    function one(){
      if(i>=items.length){ done(); return; }
      const it=items[i];
      Audio2.speakItem(it);
      stage(
        h('div',{class:'hint-kana'},'👋 Yesterday’s words'),
        bigEmoji(it),
        h('div',{class:'big-kana'},it.kana),
        romajiNode(it),
        glossNode(it),
        h('div',{class:'row'},
          speakerBtn(it),
          h('button',{class:'btn primary big',onclick:()=>{ i++; one(); }},'Next →')
        )
      );
    }
    one();
  };
}

/* Tap-what-you-hear */
function actTap(items){
  return (done)=>{
    let i=0;
    function round(){
      if(i>=items.length){ done(); return; }
      const target=items[i];
      const opts=pickOptions(target,poolForItem(target),4);
      let answered=false;
      const cards=h('div',{class:'cards g4'});
      opts.forEach(o=>{
        const card=h('div',{class:'card',onclick:()=>{
          if(answered && o.key!==target.key) return;
          if(o.key===target.key){
            if(!answered){ answered=true; record(target,true); }
            card.classList.add('correct'); Audio2.speakItem(target); feedbackToast(encourage());
            setTimeout(()=>{ i++; round(); },850);
          } else {
            if(!answered){ answered=true; record(target,false); }
            card.classList.add('wrong'); Audio2.speak(cleanSpeak('もういっかい')); feedbackToast(retryWord());
            setTimeout(()=>card.classList.remove('wrong'),450);
          }
        }}, picEl(o));
        cards.appendChild(card);
      });
      const sc=stage(
        h('div',{class:'hint-kana'},'👂 Listen and tap!'),
        speakerBtn(target,'pulse'),
        cards
      );
      setTimeout(()=>Audio2.speakItem(target),260);
    }
    round();
  };
}

/* Matching pairs (audio ↔ picture) */
function actMatch(items){
  return (done)=>{
    const pics=shuffle(items), snds=shuffle(items);
    let matched=0, selSnd=null, firstTry={};
    items.forEach(it=>firstTry[it.key]=true);
    const top=h('div',{class:'cards g3'}), bot=h('div',{class:'cards g3'});
    const picCard={}, sndCard={};
    pics.forEach(it=>{ const c=h('div',{class:'card',onclick:()=>tryMatch(it)}, picEl(it)); picCard[it.key]=c; top.appendChild(c); });
    snds.forEach(it=>{ const c=h('div',{class:'card',style:'font-size:56px',onclick:()=>{ selSnd=it; Audio2.speakItem(it); [...bot.children].forEach(x=>x.classList.remove('pick')); c.classList.add('pick'); }},'🔊'); sndCard[it.key]=c; bot.appendChild(c); });
    function tryMatch(picIt){
      if(!selSnd) return;
      if(selSnd.key===picIt.key){
        record(picIt, firstTry[picIt.key]);
        picCard[picIt.key].classList.add('correct','dim'); sndCard[picIt.key].classList.add('correct','dim');
        Audio2.speakItem(picIt); matched++; selSnd=null;
        if(matched>=items.length){ feedbackToast(encourage()); setTimeout(done,700); }
      } else {
        firstTry[selSnd.key]=false;
        picCard[picIt.key].classList.add('wrong'); feedbackToast(retryWord());
        setTimeout(()=>picCard[picIt.key].classList.remove('wrong'),450);
      }
    }
    stage( h('div',{class:'hint-kana'},'🔊 ↔ 🖼️ Match the sound to the picture!'), top, bot );
  };
}

/* Production choice (Track B): picture -> pick correct audio of 3 */
function actProduction(items){
  return (done)=>{
    let i=0;
    function round(){
      if(i>=items.length){ done(); return; }
      const target=items[i];
      const opts=pickOptions(target,poolForItem(target),3);
      let answered=false;
      const btns=h('div',{class:'row'});
      opts.forEach(o=>{
        const b=h('button',{class:'card',style:'width:150px;min-height:150px;font-size:56px',onclick:()=>{
          Audio2.speakItem(o);
          if(answered&&o.key!==target.key) return;
          if(o.key===target.key){
            if(!answered){ answered=true; record(target,true); }
            b.classList.add('correct'); Audio2.speakItem(target); feedbackToast('🗣️ Now say it!');
            setTimeout(()=>{ i++; round(); },1100);
          } else {
            if(!answered){ answered=true; record(target,false); }
            b.classList.add('wrong'); setTimeout(()=>b.classList.remove('wrong'),450);
          }
        }},'🔊');
        btns.appendChild(b);
      });
      stage(
        h('div',{class:'hint-kana'},'Which sound matches?'),
        bigEmoji(target),
        glossNode(target),
        btns
      );
    }
    round();

/* ===================== KANA BLOCK (Track B) ===================== */
function masteredKana(p){ const s=new Set(); KANA_LIST.forEach(k=>{ if(isKnownKey(p,k.key)) s.add(k.kana); }); return s; }
function nextNewKana(p,count){ const out=[]; for(const k of KANA_LIST){ if(out.length>=count) break; if(!isIntroduced(p,k.key)) out.push(k); } return out; }
function actKanaBlock(p,dueKana){
  return (done)=>{
    const steps=[];
    // review a few due kana (recognition)
    shuffle(dueKana).slice(0,3).forEach(k=>steps.push(()=>kanaRecognition(k)));
    // introduce up to 2 new kana (show + trace)
    nextNewKana(p,2).forEach(k=>steps.push(()=>kanaIntro(k)));
    // read-the-word if we have enough mastered kana
    const mk=masteredKana(p);
    if(mk.size>=3){
      const readable=DATA.words.filter(w=>{ const chars=[...w.kana]; return chars.length>=2 && chars.every(c=>mk.has(c)); }).map(w=>WORD[w.id]);
      if(readable.length) steps.push(()=>kanaRead(sample(readable)));
    }
    let s=0;
    function next(){ if(s>=steps.length){ done(); return; } const make=steps[s++]; make()(next); }
    if(!steps.length){ done(); return; }
    next();

    function kanaRecognition(k){
      return (cb=next)=>{
        const opts=pickOptions(k,KANA_LIST,4,x=>x.kana); let answered=false;
        const grid=h('div',{class:'row'});
        opts.forEach(o=>{ const t=h('div',{class:'ktile',onclick:()=>{
          if(answered&&o.key!==k.key) return;
          if(o.key===k.key){ if(!answered){answered=true;record(k,true);} t.classList.add('correct'); Audio2.speakItem(k); feedbackToast(encourage()); setTimeout(cb,800); }
          else { if(!answered){answered=true;record(k,false);} t.classList.add('wrong'); feedbackToast(retryWord()); setTimeout(()=>t.classList.remove('wrong'),450); }
        }}, o.kana); grid.appendChild(t); });
        stage( h('div',{class:'hint-kana'},'Which letter do you hear?'), speakerBtn(k,'pulse'), grid );
        setTimeout(()=>Audio2.speakItem(k),250);
      };
    }
    function kanaIntro(k){
      return (cb=next)=>{
        Audio2.speakItem(k); setTimeout(()=>Audio2.speakItem(k),650);
        stage(
          h('div',{class:'hint-kana'},'✨ New letter!'),
          h('div',{style:'font-size:clamp(120px,32vh,260px);font-weight:800'},k.kana),
          romajiNode(k),
          h('div',{class:'row'}, speakerBtn(k),
            h('button',{class:'btn primary big',onclick:()=>{ kanaTrace(k)(cb); }},'✏️ Trace it'))
        );
      };
    }
    function kanaTrace(k){
      return (cb=next)=>{
        introduceItem(CUR,k.key);
        const size=Math.min(window.innerHeight*0.6, 420);
        const cv=h('canvas',{width:size,height:size,style:'touch-action:none;background:#fff;border-radius:24px;box-shadow:var(--shadow)'});
        const ctx=cv.getContext('2d');
        ctx.fillStyle='#f0e9df'; ctx.font='bold '+(size*0.72)+'px -apple-system,"Hiragino Maru Gothic ProN",sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(k.kana,size/2,size/2);
        ctx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--accent')||'#ff8a5b'; ctx.lineWidth=14; ctx.lineCap='round'; ctx.lineJoin='round';
        let drawing=false;
        const pos=e=>{ const r=cv.getBoundingClientRect(); const t=e.touches?e.touches[0]:e; return [ (t.clientX-r.left)*(cv.width/r.width), (t.clientY-r.top)*(cv.height/r.height) ]; };
        const start=e=>{ e.preventDefault(); drawing=true; const [x,y]=pos(e); ctx.beginPath(); ctx.moveTo(x,y); };
        const move=e=>{ if(!drawing)return; e.preventDefault(); const [x,y]=pos(e); ctx.lineTo(x,y); ctx.stroke(); };
        const end=()=>{ drawing=false; };
        cv.addEventListener('touchstart',start,{passive:false}); cv.addEventListener('touchmove',move,{passive:false}); cv.addEventListener('touchend',end);
        cv.addEventListener('mousedown',start); cv.addEventListener('mousemove',move); window.addEventListener('mouseup',end);
        stage(
          h('div',{class:'hint-kana'},'✏️ Trace with your finger'),
          cv,
          h('div',{class:'row'}, speakerBtn(k,'small'),
            h('button',{class:'btn primary big',onclick:()=>{ Audio2.speakItem(k); feedbackToast(encourage()); setTimeout(cb,500); }},'Done! ✓'))
        );
        setTimeout(()=>Audio2.speakItem(k),250);
      };
    }
    function kanaRead(w){
      return (cb=next)=>{
        const opts=pickOptions(w,Object.values(WORD).filter(x=>!x.isBody),4); let answered=false;
        const cards=h('div',{class:'cards g4'});
        opts.forEach(o=>{ const c=h('div',{class:'card',onclick:()=>{
          if(answered&&o.key!==w.key) return;
          if(o.key===w.key){ if(!answered){answered=true;record(w,true);} c.classList.add('correct'); Audio2.speakItem(w); feedbackToast('You read it! 🎉'); setTimeout(cb,850); }
          else { if(!answered){answered=true;record(w,false);} c.classList.add('wrong'); feedbackToast(retryWord()); setTimeout(()=>c.classList.remove('wrong'),450); }
        }}, picEl(o)); cards.appendChild(c); });
        stage( h('div',{class:'hint-kana'},'👀 Read it — which picture?'), h('div',{class:'big-kana',style:'font-size:clamp(56px,12vh,110px)'},w.kana), cards );
      };
    }
  };
}

/* ===================== PATTERN BLOCK (Track B) ===================== */
function patternSlotWords(p,pt){
  const slot=pt.slot||{}; const posOK=slot.pos||['n']; const unitsOK=slot.units||null;
  return DATA.words.filter(w=>{
    if(!posOK.includes(w.pos)) return false;
    if(unitsOK && !unitsOK.includes(w.unit)) return false;
    if(w.isBody) return false;
    return isKnownKey(p,'w:'+w.id) || isIntroduced(p,'w:'+w.id);
  }).map(w=>WORD[w.id]);
}
function buildSentence(pt,word,colorWord){
  if(pt.id==='akai-noun'){ const cw=colorWord||WORD['aka']; return { kana:(cw.iForm||cw.kana)+word.kana, filler:word }; }
  const frame=pt.frameKana; return { kana:frame.replace('◯◯',word.kana), filler:word };
}
function actPatternBlock(p,duePat){
  return (done)=>{
    const unlocked=unlockedPatterns(p);
    // choose a pattern: prefer an unlocked-but-not-introduced one, else a due one, else random unlocked
    let pt = unlocked.find(x=>!isIntroduced(p,'pat:'+x.id));
    let introMode=!!pt;
    if(!pt){ const duePt=duePat.map(x=>x.ref); pt = duePt[0] || sample(unlocked); }
    if(!pt){ done(); return; }
    const words=patternSlotWords(p,pt);
    if(words.length<3){ done(); return; }
    if(introMode){ patternReceptive(pt,words,true,()=>{ introduceItem(CUR,'pat:'+pt.id); done(); }); return; }
    // review: pick a game
    const game=sample(['receptive','slotfill','build']);
    if(game==='slotfill') return patternSlotFill(pt,words,done);
    if(game==='build') return patternBuild(pt,words,done);
    return patternReceptive(pt,words,false,done);
  };

  function patternReceptive(pt,words,intro,cb){
    const colorWord = pt.id==='akai-noun'? sample(pt.colorSlot.map(id=>WORD[id]).filter(Boolean)) : null;
    const target=sample(words);
    const sent=buildSentence(pt,target,colorWord);
    const opts=pickOptions(target,words.length>=4?words:Object.values(WORD).filter(x=>!x.isBody),4);
    let answered=false;
    const speak=()=>{ Audio2.prime(); Audio2.speak(cleanSpeak(sent.kana)); };
    const cards=h('div',{class:'cards g4'});
    opts.forEach(o=>{ const c=h('div',{class:'card',onclick:()=>{
      if(answered&&o.key!==target.key) return;
      if(o.key===target.key){ if(!answered&&!intro){answered=true;record(PAT[pt.id],true);} else answered=true; c.classList.add('correct'); speak(); feedbackToast(encourage()); setTimeout(cb,900); }
      else { if(!answered&&!intro){answered=true;record(PAT[pt.id],false);} c.classList.add('wrong'); feedbackToast(retryWord()); setTimeout(()=>c.classList.remove('wrong'),450); }
    }}, picEl(o)); cards.appendChild(c); });
    stage(
      h('div',{class:'hint-kana'},(intro?'✨ ':'')+'Listen and find'),
      h('div',{class:'gloss small'}, pt.en),
      h('button',{class:'speaker pulse',onclick:speak},'🔊'),
      cards
    );
    setTimeout(speak,300);
  }

  function patternSlotFill(pt,words,cb){
    const colorWord = pt.id==='akai-noun'? sample(pt.colorSlot.map(id=>WORD[id]).filter(Boolean)) : null;
    const target=sample(words); const sent=buildSentence(pt,target,colorWord);
    const frameShown = pt.id==='akai-noun' ? (colorWord.iForm||colorWord.kana)+'◯◯' : pt.frameKana;
    const opts=pickOptions(target,words,4);
    let answered=false;
    const cards=h('div',{class:'cards g4'});
    opts.forEach(o=>{ const c=h('div',{class:'card',style:'font-size:34px;flex-direction:column',onclick:()=>{
      if(answered&&o.key!==target.key) return;
      if(o.key===target.key){ if(!answered){answered=true;record(PAT[pt.id],true);} c.classList.add('correct'); Audio2.speak(cleanSpeak(sent.kana)); feedbackToast(encourage()); setTimeout(cb,900); }
      else { if(!answered){answered=true;record(PAT[pt.id],false);} c.classList.add('wrong'); feedbackToast(retryWord()); setTimeout(()=>c.classList.remove('wrong'),450); }
    }}, h('div',{class:'bigpic',style:'font-size:64px'},picEl(o)), h('div',{class:'kana',style:'font-size:26px'},o.kana)); cards.appendChild(c); });
    stage(
      h('div',{class:'hint-kana'},'Which word fits?'),
      h('div',{class:'gloss small'}, pt.en),
      h('div',{class:'bigpic',style:'font-size:80px'},picEl(target)),
      h('div',{class:'big-kana',style:'font-size:clamp(40px,8vh,64px);color:var(--muted)'}, frameShown.replace('◯◯','＿＿')),
      cards
    );
  }

  function patternBuild(pt,words,cb){
    // build-a-sentence: arrange tiles in order. Particles colored.
    const colorWord = pt.id==='akai-noun'? sample(pt.colorSlot.map(id=>WORD[id]).filter(Boolean)) : null;
    const target=sample(words);
    const tokens=tokenize(pt,target,colorWord); // [{t,cls}]
    const answer=tokens.map(x=>x.t);
    const slotRow=h('div',{class:'row',style:'min-height:80px;gap:8px;flex-wrap:wrap'});
    const bank=h('div',{class:'row',style:'gap:10px;flex-wrap:wrap'});
    let placed=[];
    const shuffled=shuffle(tokens.map((x,idx)=>({...x,idx})));
    const tileEls={};
    shuffled.forEach(tok=>{ const b=h('button',{class:'tile '+(tok.cls||''),onclick:()=>place(tok,b)}, tok.t); tileEls[tok.idx]=b; bank.appendChild(b); });
    function renderSlots(){ slotRow.innerHTML=''; answer.forEach((_,i)=>{ const filled=placed[i]; slotRow.appendChild(h('span',{class:'slot'}, filled!=null?tokens[filled].t:'＿')); }); }
    function place(tok,b){ if(b.classList.contains('used'))return; const nextIdx=placed.length; if(tok.idx!==tokensOrderIndex(nextIdx)) { b.classList.add('used'); /* still allow but check order at end */ } placed.push(tok.idx); b.classList.add('used'); renderSlots(); if(placed.length===answer.length) checkDone(); }
    function tokensOrderIndex(i){ return i; }
    function checkDone(){
      const ok = placed.every((idx,i)=>idx===i);
      if(ok){ record(PAT[pt.id],true); Audio2.speak(cleanSpeak(answer.join(''))); feedbackToast(encourage()); setTimeout(cb,1000); }
      else { record(PAT[pt.id],false); feedbackToast(retryWord()); // reset
        placed=[]; Object.values(tileEls).forEach(b=>b.classList.remove('used')); renderSlots(); }
    }
    renderSlots();
    stage(
      h('div',{class:'hint-kana'},'Build the sentence!'),
      h('div',{class:'gloss small'}, pt.en),
      h('div',{class:'bigpic',style:'font-size:70px'},picEl(target)),
      slotRow, bank,
      h('button',{class:'btn ghost',style:'min-height:60px;font-size:22px',onclick:()=>{ placed=[]; Object.values(tileEls).forEach(b=>b.classList.remove('used')); renderSlots(); }},'🔁 Start over')
    );
  }
  function tokenize(pt,word,colorWord){
    // returns ordered tokens with particle coloring
    if(pt.id==='akai-noun'){ const cw=colorWord||WORD['aka']; return [ {t:(cw.iForm||cw.kana),cls:''}, {t:word.kana,cls:''} ]; }
    const f=pt.frameKana; const parts=f.split('◯◯'); const before=parts[0]||'', after=parts[1]||'';
    const toks=[];
    if(before) splitParticles(before).forEach(x=>toks.push(x));
    toks.push({t:word.kana,cls:''});
    if(after) splitParticles(after).forEach(x=>toks.push(x));
    return toks;
  }
  function splitParticles(s){
    // pull out は / が / を as their own colored tiles; keep the rest as one tile
    const out=[]; let buf='';
    for(const ch of s){
      if(ch==='は'||ch==='が'||ch==='を'){ if(buf){ out.push({t:buf,cls:'p-end'}); buf=''; } out.push({t:ch,cls: ch==='は'?'p-wa':ch==='が'?'p-ga':'p-o'}); }
      else buf+=ch;
    }
    if(buf) out.push({t:buf,cls:'p-end'});
    return out;
  }
}

/* ===================== END OF SESSION ===================== */
function endSession(){
  const p=CUR;
  // streak + garden + stats
  updateStreak(p);
  p.garden.growth = (p.garden.growth||0) + 1 + SESS.newlyKnown.length;
  p.stats.sessions=(p.stats.sessions||0)+1;
  p.stats.lastSessionDate=todayStr();
  const newStickers=checkStickers(p);
  saveProfile(p);
  // results screen
  const acc = SESS.total? Math.round(100*SESS.correct/SESS.total):100;
  const wrap=h('div',{class:'screen'},
    h('div',{class:'center'},
      h('div',{class:'celebrate'},'🌟'),
      h('div',{class:'big-kana'},'Great job!'),
      h('div',{class:'row'},
        h('div',{class:'chip',style:'font-size:24px'},'⭐ ',SESS.correct,'/',SESS.total),
        h('div',{class:'chip',style:'font-size:24px'},'🔥 ',streakLabel(p)),
        SESS.newlyKnown.length? h('div',{class:'chip',style:'font-size:24px'},'🆕 ',SESS.newlyKnown.length,' new words'):null
      ),
      h('div',{class:'panel',style:'width:min(70vw,520px);height:min(34vh,300px)'}, gardenSVG(p)),
      h('div',{class:'row',style:'gap:16px'},
        h('button',{class:'btn ghost big',onclick:startLearnMore},'📚 Learn more'),
        h('button',{class:'btn primary big',onclick:()=>{ confettiBurst(); screenHome(); }},'🏠 Home')
      )
    )
  );
  mount(wrap);
  confettiBurst();
  if(newStickers.length) setTimeout(()=>celebrateStickers(newStickers),700);
}
function updateStreak(p){
  const t=todayStr();
  if(p.streak.lastDate===t) return;
  if(!p.streak.lastDate){ p.streak.count=1; }
  else{
    const gap=daysBetween(p.streak.lastDate,t);
    if(gap===1) p.streak.count=(p.streak.count||0)+1;
    else if(gap===2){ const w=weekId(new Date()); if(p.streak.graceWeek!==w){ p.streak.count=(p.streak.count||0)+1; p.streak.graceWeek=w; } else p.streak.count=1; }
    else p.streak.count=1;
  }
  p.streak.lastDate=t;
}

/* ===================== LEARN MORE (on-demand new words) =====================
   A kid who wants to power ahead can keep learning, uncapped, in blocks of 3:
   meet 3 new words, then a couple of check rounds on just those 3 (gentle retry
   until each is right) before the next block. Separate from the daily quest —
   it doesn't touch the streak; the daily session stays the review engine. */
let LM=null;
function startLearnMore(){ LM={learned:0}; learnBlock(); }
function learnBlock(){
  const block=nextNewWords(CUR,3);
  if(!block.length){ finishLearnMore(true); return; }
  SESS={acts:[],i:0,correct:0,total:0,newlyKnown:[],introduced:[],seen:new Set(),learnMore:true};
  const acts=[];
  block.forEach(it=> acts.push(actIntro(it)));   // meet each word (intro + tap-check)
  acts.push(actBlockCheck(block));               // then check the 3 before moving on
  runActs(acts, ()=>{ LM.learned+=block.length; offerNextBlock(block); });
}
function runActs(acts,onDone){
  SESS.acts=acts; let i=0;
  (function next(){ SESS.i=i; if(i>=acts.length){ onDone(); return; } acts[i++](next); })();
}
function optsForCheck(target,block){
  const chosen=[target]; const used=new Set([target.emoji]);
  const cands=shuffle(block.filter(x=>x.key!==target.key))
    .concat(shuffle(poolForItem(target).filter(x=>!block.some(b=>b.key===x.key))));
  for(const x of cands){ if(chosen.length>=4) break; if(used.has(x.emoji)) continue; chosen.push(x); used.add(x.emoji); }
  return shuffle(chosen);
}
function actBlockCheck(block){
  return (done)=>{
    const seq=shuffle(block).concat(shuffle(block)); // two passes: each of the 3 twice
    let i=0;
    function round(){
      if(i>=seq.length){ done(); return; }
      const target=seq[i]; const opts=optsForCheck(target,block); let answered=false;
      const cards=h('div',{class:'cards g4'});
      opts.forEach(o=>{ const card=h('div',{class:'card',onclick:()=>{
        if(answered&&o.key!==target.key) return;
        if(o.key===target.key){ answered=true; card.classList.add('correct'); Audio2.speakItem(target); feedbackToast(encourage()); setTimeout(()=>{ i++; round(); },800); }
        else { card.classList.add('wrong'); Audio2.speak(cleanSpeak('もういっかい')); feedbackToast(retryWord()); setTimeout(()=>card.classList.remove('wrong'),450); }
      }}, picEl(o)); cards.appendChild(card); });
      stage( h('div',{class:'hint-kana'},'🧠 Do you remember?  ('+(i+1)+'/'+seq.length+')'), speakerBtn(target,'pulse'), cards );
      setTimeout(()=>Audio2.speakItem(target),260);
    }
    round();
  };
}
function lmHead(){
  return h('div',{class:'shead'},
    h('div',{class:'mini-ava'},CUR.avatar),
    h('div',{class:'hint-kana',style:'font-size:22px'},'📚 Learn'),
    h('button',{class:'btn ghost',style:'min-height:56px;min-width:56px;font-size:24px;padding:0 16px',onclick:screenHome},'🏠')
  );
}
function offerNextBlock(block){
  const pics=h('div',{class:'row',style:'gap:24px;flex-wrap:wrap'}, block.map(it=> h('div',{style:'text-align:center'},
    h('div',{class:'bigpic',style:'font-size:84px'}, picEl(it)),
    h('div',{class:'big-kana',style:'font-size:34px'}, it.kana),
    romajiOn()? h('div',{class:'romaji'}, it.romaji):null,
    h('div',{class:'gloss small'}, it.en) )));
  mount(h('div',{class:'screen'}, lmHead(), h('div',{class:'center'},
    h('div',{style:'font-size:70px'},'🎉'),
    h('div',{class:'hint-kana'},'You learned '+block.length+' new words!'),
    pics,
    h('div',{class:'row',style:'gap:16px;margin-top:6px'},
      h('button',{class:'btn primary big',onclick:learnBlock},'📚 Learn 3 more'),
      h('button',{class:'btn ghost big',onclick:()=>finishLearnMore(false)},'✓ Done')
    )
  )));
}
function finishLearnMore(all){
  const n=LM?LM.learned:0;
  CUR.garden.growth=(CUR.garden.growth||0)+n; saveProfile(CUR);
  mount(h('div',{class:'screen'}, lmHead(), h('div',{class:'center'},
    h('div',{class:'celebrate'},'📚'),
    h('div',{class:'big-kana'}, all? 'You learned them all! 🏆':'Great learning!'),
    n? h('div',{class:'chip',style:'font-size:24px'},'🆕 '+n+' new words'):null,
    h('div',{class:'panel',style:'width:min(60vw,460px);height:min(30vh,260px)'}, gardenSVG(CUR)),
    h('button',{class:'btn primary big',onclick:()=>{ confettiBurst(); screenHome(); }},'🏠 Home')
  )));
  confettiBurst(); LM=null;
}

/* ===================== STICKERS ===================== */
function stickerCatalog(){
  const list=[
    {id:'w10',emoji:'🥉',label:'10'}, {id:'w25',emoji:'🥈',label:'25'},
    {id:'w50',emoji:'🥇',label:'50'}, {id:'w100',emoji:'🏆',label:'100'}
  ];
  DATA.kanaGroups.forEach(g=>list.push({id:'kana:'+g.id,emoji:'🈁',label:g.name.replace(' row','')}));
  DATA.patterns.forEach(pt=>list.push({id:'pat:'+pt.id,emoji:'🎏',label:pt.frameKana.replace('◯◯','＿')}));
  return list;
}
function earnedSet(p){ return new Set(p.stickers||[]); }
function checkStickers(p){
  const have=earnedSet(p); const got=[];
  const kw=knownWordCount(p);
  [['w10',10],['w25',25],['w50',50],['w100',100]].forEach(([id,n])=>{ if(kw>=n && !have.has(id)){ p.stickers.push(id); got.push(id); }});
  DATA.kanaGroups.forEach(g=>{ const all=g.kana.every(k=>isKnownKey(p,'k:'+k.k)); if(all && !have.has('kana:'+g.id)){ p.stickers.push('kana:'+g.id); got.push('kana:'+g.id); }});
  DATA.patterns.forEach(pt=>{ if(isKnownKey(p,'pat:'+pt.id) && !have.has('pat:'+pt.id)){ p.stickers.push('pat:'+pt.id); got.push('pat:'+pt.id); }});
  return got;
}
function celebrateStickers(ids){
  const cat=stickerCatalog(); const items=ids.map(id=>cat.find(c=>c.id===id)).filter(Boolean);
  const ov=h('div',{class:'overlay',onclick:e=>{ if(e.target===ov) ov.remove(); }},
    h('div',{class:'sheet',style:'text-align:center;max-width:520px'},
      h('div',{class:'hint-kana'},'New sticker! 🎉'),
      h('div',{class:'row',style:'margin:14px 0'}, items.map(it=>h('div',{class:'sticker',style:'animation:pop .5s'}, h('div',{style:'font-size:52px'},it.emoji), h('small',{},it.label)))),
      h('button',{class:'btn primary',onclick:()=>ov.remove()},'Yay!')
    ));
  document.body.appendChild(ov); confettiBurst();
}
function screenStickers(){
  const p=CUR; const cat=stickerCatalog(); const have=earnedSet(p);
  const grid=h('div',{class:'row',style:'gap:12px;align-content:flex-start;overflow:auto;max-height:70vh'});
  cat.forEach(c=>{ grid.appendChild(h('div',{class:'sticker'+(have.has(c.id)?'':' locked')}, h('div',{style:'font-size:44px'}, have.has(c.id)?c.emoji:'❓'), h('small',{},c.label))); });
  mount(h('div',{class:'screen'},
    gearNode(),
    h('div',{class:'center',style:'justify-content:flex-start;padding-top:20px'},
      h('div',{class:'hint-kana'},'🏅 Sticker Book  ('+have.size+'/'+cat.length+')'),
      grid,
      h('button',{class:'btn primary big',onclick:screenHome},'🏠 Back')
    )
  ));
}

/* ===================== PARENT GATE + DASHBOARD ===================== */
function gearNode(){
  const fill=h('div',{class:'fill'});
  const g=h('div',{class:'gear'}, fill, h('div',{},'⚙️'));
  let timer=null,start=0,raf=null;
  const begin=e=>{ e.preventDefault(); start=Date.now();
    const tick=()=>{ const el=Date.now()-start; fill.style.setProperty('--p',(Math.min(1,el/3000)*360)+'deg'); if(el<3000) raf=requestAnimationFrame(tick); };
    tick();
    timer=setTimeout(()=>{ cancel(); openDashboard(); },3000);
  };
  const cancel=()=>{ clearTimeout(timer); cancelAnimationFrame(raf); fill.style.setProperty('--p','0deg'); };
  g.addEventListener('pointerdown',begin); g.addEventListener('pointerup',cancel); g.addEventListener('pointerleave',cancel); g.addEventListener('pointercancel',cancel);
  return g;
}
function openDashboard(){ const p=CUR||loadProfile('A')||loadProfile('B'); if(!p){ return; } screenDashboard(p); }

function screenDashboard(p){
  const kw=knownWordCount(p);
  const days=daysSinceStart(p);
  // per-unit known
  const unitRows=DATA.units.map(u=>{ const ws=WORDS_BY_UNIT[u.id]; const k=ws.filter(it=>isKnownKey(p,it.key)).length;
    return h('tr',{}, h('td',{}, u.emoji+' '+u.en), h('td',{class:'num'}, k+'/'+ws.length),
      h('td',{style:'width:40%'}, h('div',{class:'bar'}, h('i',{style:'width:'+Math.round(100*k/ws.length)+'%'})))); });
  // kana grid
  const kgrid=h('div',{class:'grid46'});
  KANA_LIST.forEach(k=>{ const s=p.items['k:'+k.kana]; const cls=!s||!s.introducedDate?'':(s.box>=3?'known':'seen'); kgrid.appendChild(h('div',{class:'kcell '+cls},k.kana)); });
  // patterns
  const unl=unlockedPatterns(p);
  const patRows=DATA.patterns.map(pt=>{ const on=patternUnlocked(p,pt); const known=isKnownKey(p,'pat:'+pt.id);
    return h('span',{class:'pill',style:on?'':'opacity:.45'}, (known?'✅ ':on?'🔓 ':'🔒 ')+pt.frameKana); });
  // next unlocks
  const nextUnlocks=[];
  if(!hiraganaUnlocked(p)) nextUnlocks.push('Hiragana: day '+days+'/30 · '+kw+'/60 words');
  DATA.patterns.forEach(pt=>{ if(!patternUnlocked(p,pt)){ let s=pt.frameKana+' — '+kw+'/'+pt.unlock.knownWords+' words'; if(pt.unlock.unitStarted&&!unitStarted(p,pt.unlock.unitStarted)) s+=' + start '+pt.unlock.unitStarted; nextUnlocks.push(s); } });
  // weekly family phrase (WITH romaji - parent only)
  const wk=Math.min(8,Math.max(1,Math.floor(days/7)+1));
  const wkPhrases=DATA.phrases.filter(ph=>ph.week===wk); const fam=wkPhrases.length?sample(wkPhrases):DATA.phrases[0];
  const famCard=h('div',{class:'panel',style:'text-align:center'},
    h('div',{class:'small'},'This week\'s family phrase (week '+wk+')'),
    h('div',{style:'font-size:44px'},fam.emoji),
    h('div',{class:'big-kana',style:'font-size:40px'},fam.kana),
    h('div',{style:'font-size:20px;color:var(--muted);font-weight:800'},fam.romaji),
    h('div',{class:'small'},'"'+fam.en+'" · '+fam.when)
  );
  // settings
  const npd=p.settings.newPerDay;
  const npdRow=h('div',{class:'seg'}, [3,4,5,6,8,10].map(n=>h('button',{class:n===npd?'on':'',onclick:()=>{ p.settings.newPerDay=n; saveProfile(p); screenDashboard(p); }},n)));
  const slRow=h('div',{class:'seg'}, ['short','normal','long'].map(s=>h('button',{class:s===p.settings.sessionLen?'on':'',onclick:()=>{ p.settings.sessionLen=s; saveProfile(p); screenDashboard(p); }}, s==='short'?'Short':s==='long'?'Long':'Normal')));
  const romOn=p.settings.romaji!==false;
  const romRow=h('div',{class:'seg'}, [[true,'On'],[false,'Off']].map(([v,l])=>h('button',{class:v===romOn?'on':'',onclick:()=>{ p.settings.romaji=v; saveProfile(p); if(CUR&&CUR.id===p.id) CUR=loadProfile(p.id); screenDashboard(p); }}, l)));

  const otherId = p.id==='A'?'B':'A'; const other=loadProfile(otherId);
  const sheet=h('div',{class:'sheet dash'},
    h('div',{class:'row',style:'justify-content:space-between'},
      h('h2',{}, p.avatar+' Progress'),
      h('div',{},
        other? h('button',{class:'btn ghost',style:'min-height:44px;font-size:16px;margin-right:8px',onclick:()=>screenDashboard(other)}, other.avatar+' switch'):null,
        h('button',{class:'btn ghost',style:'min-height:44px;font-size:16px',onclick:()=>{ document.querySelector('.overlay').remove(); }},'✕ close'))
    ),
    h('div',{class:'row',style:'justify-content:flex-start;gap:18px'},
      h('div',{}, h('div',{class:'num',style:'font-size:34px'},kw), h('div',{class:'small'},'known words (box 3+)')),
      h('div',{}, h('div',{class:'num',style:'font-size:34px'},p.streak.count||0), h('div',{class:'small'},'day streak')),
      h('div',{}, h('div',{class:'num',style:'font-size:34px'},p.stats.sessions||0), h('div',{class:'small'},'sessions')),
      h('div',{}, h('div',{class:'num',style:'font-size:34px'},'day '+days), h('div',{class:'small'},'since start'))
    ),
    famCard,
    h('h3',{},'Known words by unit'),
    h('table',{}, unitRows),
    h('div',{}, h('h3',{},'Hiragana '+(hiraganaUnlocked(p)?'(unlocked)':'(locked)')), kgrid),
    h('div',{}, h('h3',{},'Patterns'), h('div',{class:'chips'},patRows)),
    nextUnlocks.length? h('div',{}, h('h3',{},'Next unlocks'), h('ul',{style:'margin:0;padding-left:18px;font-size:14px;color:var(--muted)'}, nextUnlocks.map(s=>h('li',{style:'margin:3px 0'},s)))):null,
    h('h3',{},'Settings'),
    h('div',{class:'row',style:'justify-content:flex-start;gap:22px;flex-wrap:wrap'},
      h('div',{}, h('div',{class:'small'},'New items / day'), npdRow),
      h('div',{}, h('div',{class:'small'},'Session length'), slRow),
      h('div',{}, h('div',{class:'small'},'Romaji (sound-it-out under kana)'), romRow)
    ),
    h('div',{class:'row',style:'justify-content:flex-start;gap:10px;margin-top:8px'},
      h('button',{class:'btn ghost',style:'min-height:50px;font-size:16px',onclick:()=>{ if(confirm('Reset kana intro? Kana will be re-taught from the start (words are kept).')){ resetKana(p); screenDashboard(p);} }},'↺ Reset kana intro'),
      h('button',{class:'btn ghost',style:'min-height:50px;font-size:16px',onclick:()=>exportProgress(p)},'⬇️ Export'),
      h('button',{class:'btn ghost',style:'min-height:50px;font-size:16px',onclick:()=>importDialog(p)},'⬆️ Import')
    ),
    h('div',{class:'small',style:'margin-top:10px'},'“Known” counts only words recalled after a gap (box 3+). “Seen” is never counted.')
  );
  const ov=h('div',{class:'overlay',onclick:e=>{ if(e.target===ov) ov.remove(); }}, sheet);
  const ex=document.querySelector('.overlay'); if(ex) ex.remove();
  document.body.appendChild(ov);
}
function resetKana(p){ KANA_LIST.forEach(k=>{ delete p.items['k:'+k.kana]; }); saveProfile(p); }
function exportProgress(p){
  const data=JSON.stringify(p);
  try{ const blob=new Blob([data],{type:'application/json'}); const url=URL.createObjectURL(blob);
    const a=h('a',{href:url,download:'nihongo-'+p.id+'-'+todayStr()+'.json'}); document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1000);
  }catch(e){}
  // also show copyable text (iOS-friendly)
  const ov=h('div',{class:'overlay',onclick:e=>{ if(e.target===ov) ov.remove(); }},
    h('div',{class:'sheet',style:'max-width:600px'},
      h('h3',{},'Backup (copy this text)'),
      h('textarea',{readonly:true,onclick:function(){ this.select(); }}, data),
      h('button',{class:'btn primary',style:'margin-top:10px',onclick:()=>ov.remove()},'Done')
    ));
  document.body.appendChild(ov);
}
function importDialog(p){
  const ta=h('textarea',{placeholder:'Paste backup JSON here'});
  const ov=h('div',{class:'overlay',onclick:e=>{ if(e.target===ov) ov.remove(); }},
    h('div',{class:'sheet',style:'max-width:600px'},
      h('h3',{},'Import backup for '+p.id),
      ta,
      h('div',{class:'row',style:'justify-content:flex-start;margin-top:10px'},
        h('button',{class:'btn primary',onclick:()=>{ try{ const obj=JSON.parse(ta.value); if(!obj||!obj.items){ alert('Not a valid backup.'); return; } obj.id=p.id; saveProfile(migrate(obj)); alert('Imported!'); ov.remove(); if(CUR&&CUR.id===p.id){ CUR=loadProfile(p.id); setAccent(CUR);} openDashboard(); }catch(err){ alert('Could not read that backup.'); } }},'Import'),
        h('button',{class:'btn ghost',onclick:()=>ov.remove()},'Cancel'))
    ));
  document.body.appendChild(ov);
}
